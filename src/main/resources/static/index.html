<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Billing Platform Demo</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 520px;
            margin: 40px auto;
            padding: 0 16px;
        }

        form {
            display: grid;
            gap: 12px;
        }

        input, button {
            padding: 10px;
            font-size: 16px;
        }

        button {
            width: 520px;
        }

        #result {
            margin-top: 16px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<button id="pingButton" type="button">Ping</button>

<h1>Create customer</h1>
<form id="customerForm">
    <label for="name"></label>
    <input id="name" name="name" placeholder="Name" required/>

    <label for="email"></label>
    <input id="email" name="email" placeholder="Email" required type="email"/>

    <button type="submit">Create</button>
</form>

<button id="allCustomersButton" type="button">All customers</button>

<div id="result"></div>

<script>
    const customerEndpoint = "http://localhost:8080/api/v1/customers";
    const pingEndpoint = "http://localhost:8080/api/v1/ping";

    const customer_form = document.getElementById("customerForm");
    const pingButton = document.getElementById("pingButton");
    const allCustomers = document.getElementById("allCustomersButton");

    const result = document.getElementById("result");

    async function createCustomer(payload) {
        const response = await fetch(customerEndpoint, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const body = await response.text();

        return {
            url: response.url,
            status: response.status,
            body: body,
            error: !response.ok
        };
    }

    customer_form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const payload = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value
        };

        try {
            const response = await createCustomer(payload);

            if (response.error) {
                result.textContent =
                    `Request failed via ${response.url}\nStatus: ${response.status}\nBody: ${response.body}`;
                return;
            }

            result.textContent =
                `URL: ${response.url}\nStatus: ${response.status}\nBody: ${response.body}`;
        } catch (err) {
            result.textContent = `Request failed: ${err}`;
        }
    });

    async function checkPing() {
        try {
            const response = await fetch(pingEndpoint);
            const body = await response.text();

            if (!response.ok) {
                result.textContent =
                    `Request failed via ${response.url}\nStatus: ${response.status}\nBody: ${body}`;
                return;
            }

            result.textContent =
                `URL: ${response.url}\nStatus: ${response.status}\nBody: ${body}`;
        } catch (err) {
            result.textContent = `Request failed: ${err}`;
        }
    }

    pingButton.addEventListener("click", checkPing);

    async function getAllCustomers() {
        try {
            const response = await fetch(customerEndpoint);
            const body = await response.text();

            if (!response.ok) {
                result.textContent =
                    `Request failed via ${response.url}\nStatus: ${response.status}\nBody: ${body}`;
                return;
            }

            result.textContent =
                `URL: ${response.url}\nStatus: ${response.status}\nBody: ${body}`;
        } catch (err) {
            result.textContent = `Request failed: ${err}`;
        }
    }

    allCustomers.addEventListener("click", getAllCustomers);
</script>
</body>
</html>
